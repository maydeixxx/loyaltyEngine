spring.application.name=transaction-service
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/loyalty_db
spring.datasource.password=admin
spring.datasource.username=postgres
spring.jpa.hibernate.ddl-auto=create

spring.kafka.bootstrap-servers=localhost:9092
kafka.topics.dlqSuffix=.DLQ
kafka.topics.transaction-created=transaction_created
kafka.topics.points-failed=points_failed
kafka.topics.transaction-handled=transaction_handled

management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans