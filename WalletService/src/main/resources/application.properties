spring.application.name=wallet-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5434/wallet_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create

spring.kafka.bootstrap-servers=localhost:9092
kafka.topics.points-calculated=points_calculated
kafka.topics.transaction-handled=transaction_handled
kafka.topics.dlq-suffix=.DLQ

management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans