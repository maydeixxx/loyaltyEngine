version: '3.8'
services:
  postgres-transaction:
    image: postgres:15
    container_name: loyalty-postgres-transaction
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: loyalty_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_transaction_data:/var/lib/postgresql/data
    networks:
      - loyalty-network

  postgres-ruleEngine:
    image: postgres:15
    container_name: loyalty-postgres-ruleEngine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ruleEngine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_ruleEngine_data:/var/lib/postgresql/data
    networks:
      - loyalty-network

  postgres-wallet:
    image: postgres:15
    container_name: loyalty-postgres-wallet
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_wallet_data:/var/li
    networks:
      - loyalty-network

  redis:
    image: redis:7-alpine
    container_name: loyalty-redis
    ports:
      - "6379:6379"
    networks:
      - loyalty-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: loyalty-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - loyalty-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: loyalty-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - loyalty-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: loyalty-zipkin
    ports:
      - "9411:9411"
    networks:
      - loyalty-network

volumes:
  postgres_transaction_data:
  postgres_ruleEngine_data:
  postgres_wallet_data:

networks:
  loyalty-network:
    driver: bridge