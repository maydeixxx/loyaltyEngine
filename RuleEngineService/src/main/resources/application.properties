spring.application.name=rule-engine-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/ruleEngine_db
spring.datasource.password=admin
spring.datasource.username=postgres
spring.jpa.hibernate.ddl-auto=create

spring.data.redis.host=localhost
spring.data.redis.port=6379

kafka.topics.transaction-created=transaction_created
kafka.topics.points-calculated=points_calculated
kafka.topics.dlq-suffix=.DLQ
spring.jackson.deserialization.use-big-decimal-for-floats=true
spring.kafka.bootstrap-servers=localhost:9092

management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans