spring.application.name= RuleEngineService
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/ruleEngine_db
spring.datasource.password=admin
spring.datasource.username=postgres
spring.jpa.hibernate.ddl-auto=create

spring.data.redis.host=localhost
spring.data.redis.port=6379

kafka.topics.transaction-created=transaction_created
kafka.topics.points-calculated=points_calculated
kafka.topics.dlq-suffix=.DLQ

spring.kafka.bootstrap-servers=localhost:9092